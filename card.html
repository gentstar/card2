<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>웹 명함 - 김의진</title>
  <link rel="stylesheet" href="./card.css" />
</head>
<body>
  <div class="wrap">
    <section class="card" aria-label="웹 명함">
      <div class="inner">
        <div class="top">
          <div class="avatar" aria-hidden="true"><span>김</span></div>
          <div>
            <h1 class="name">김의진</h1>
            <div class="role">
              <span class="badge">직업</span>
              <span>경찰</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <p class="tagline">
          착한사람.
          <small>한줄 소개</small>
        </p>

        <div class="footer">
          <div class="hint">웹 명함</div>
          <div>김의진 · 경찰</div>
        </div>

        <div class="cta">
          <a class="btn" href="https://youtu.be/FSg2laEjEXM?si=SsrEHitO3jJNi5Bi" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <rect x="2.8" y="2.8" width="18.4" height="18.4" rx="6.2" fill="#ff0000"/>
              <path d="M10.2 8.7v6.6l6-3.3-6-3.3z" fill="#ffffff"/>
            </svg>
            <span>클릭하세요</span>
          </a>
        </div>
      </div>
    </section>
  </div>

  <script src="./card.js" defer></script>
</body>
</html>
